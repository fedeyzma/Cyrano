services:
  cyrano:
    build: .
    container_name: cyrano
    ports:
      - "3000:3000"
    environment:
      # Cami lives on the LAN; the container must be able to route to that IP.
      # (A LAN IP like 192.168.x.x works from the default bridge network — no
      # host.docker.internal needed, since Cami isn't on the Docker host itself.)
      - CAMI_API_URL=${CAMI_API_URL:-http://192.168.69.244:8642}
      - CAMI_API_KEY=${CAMI_API_KEY}
      - CAMI_API_MODEL=${CAMI_API_MODEL:-cami}
      - CAMI_API_TIMEOUT_MS=${CAMI_API_TIMEOUT_MS:-45000}
      - SUGGESTION_COUNT=${SUGGESTION_COUNT:-4}
      - SUGGESTION_TEMPERATURE=${SUGGESTION_TEMPERATURE:-0.8}
      - USER_CONTEXT_PATH=${USER_CONTEXT_PATH:-/app/fred_context.md}
      - DATABASE_PATH=/data/cyrano.db
    volumes:
      - cyrano-data:/data
      # Uncomment to live-edit your context without rebuilding the image:
      # - ./fred_context.md:/app/fred_context.md:ro
    restart: unless-stopped

volumes:
  cyrano-data:
